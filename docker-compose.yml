services:
  opencode:
    image: ghcr.io/daveymena/openco:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "21293:21293"   # Web UI principal
      - "6080:6080"     # noVNC (pantalla remota)
    environment:
      # ─── Puertos internos ───────────────────────────────────
      PORT: "21293"
      OPENCODE_PORT: "21294"
      OPERATOR_PORT: "3001"
      NODE_ENV: "production"
      TZ: "America/Bogota"
      DISPLAY: ":99"

      # ─── API Keys IA (gratuitas) ───────────────────────────
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""
      CEREBRAS_API_KEY: ""
      TOGETHER_AI_API_KEY: ""

      # ─── GitHub Copilot ─────────────────────────────────────
      GITHUB_TOKEN: ""
      GITHUB_COPILOT_ENABLED: "false"
      COPILOT_MODEL: "gpt-4o"

      # ─── API Keys de pago ───────────────────────────────────
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      GOOGLE_GENERATIVE_AI_API_KEY: ""

      # ─── Freemodel ──────────────────────────────────────────
      FREEMODEL_API_KEY: ""
      FREEMODEL_BASE_URL: "https://api.freemodel.dev/v1"
      FREEMODEL_MODEL: "gpt-4o"

      # ─── Puter.js ───────────────────────────────────────────
      PUTER_AUTH_TOKEN: ""

      # ─── Base de datos Easypanel (PostgreSQL interno) ───────
      DATABASE_URL: ""

    volumes:
      - chrome_session:/app/.chrome-session
      - site_memory:/app/web-operator/.site-memory
      - opencode_config:/root/.config/opencode

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:21293/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chrome_session:
  site_memory:
  opencode_config:
