version: "3.9"

# ============================================================
# OpenCode - Docker Compose para despliegue local o servidor
# Uso: docker compose up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # OpenCode (interfaz web + agente de IA)
  # ----------------------------------------------------------
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-app:latest
    container_name: opencode
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: "3000"
      OPENCODE_WORKSPACE: /workspace

      # ---- GRATUITOS (solo registro) ----
      # Groq: https://console.groq.com/keys
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # OpenRouter: https://openrouter.ai/keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # Cerebras: https://cloud.cerebras.ai
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}

      # Together AI: https://api.together.xyz
      TOGETHER_AI_API_KEY: ${TOGETHER_AI_API_KEY:-}

      # ---- DE PAGO OPCIONALES ----
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}

      # ---- Ollama (automático si el servicio está activo) ----
      OLLAMA_HOST: http://ollama:11434

    volumes:
      # Workspace persistente (tus proyectos y código)
      - opencode_workspace:/workspace
      # Base de datos SQLite de OpenCode (sesiones, memoria)
      - opencode_data:/root/.local/share/opencode
      # Configuración
      - opencode_config:/root/.config/opencode
    depends_on:
      ollama:
        condition: service_started
    networks:
      - opencode_net

  # ----------------------------------------------------------
  # Ollama — modelos de IA 100% locales y gratuitos
  # Instala modelos con: docker exec opencode_ollama ollama pull llama3.3
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: opencode_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - opencode_net
    # Para GPU NVIDIA, descomenta esto:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  opencode_workspace:
    driver: local
  opencode_data:
    driver: local
  opencode_config:
    driver: local
  ollama_models:
    driver: local

networks:
  opencode_net:
    driver: bridge
