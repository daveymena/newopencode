# ============================================================
# OpenCode - Configuración para EasyPanel
# Sube este repositorio a GitHub y úsalo en EasyPanel
# como "App from GitHub" → selecciona este repo
# ============================================================

services:
  opencode:
    type: app
    build:
      type: dockerfile
      file: Dockerfile
    domains:
      - host: "$(PRIMARY_DOMAIN)"
        port: 3000
        https: true
    env:
      PORT: "3000"
      OPENCODE_WORKSPACE: /workspace
      OPENCODE_SERVER_PASSWORD: "6715320Dvd."
      # Puertos internos (OpenCode engine + Web Operator)
      OPENCODE_PORT: "21294"
      OPERATOR_PORT: "3001"
      API_SERVER_PORT: "3001"
      NODE_ENV: "production"
      TZ: "America/Bogota"
      DISPLAY: ":99"
      # PostgreSQL — Credenciales del servicio en EasyPanel
      # Hostname interno (dentro de EasyPanel): tecnoia_tecnologi
      # Hostname externo: 144.91.112.79
      DB_HOST: "tecnoia_tecnologi"
      DB_PORT: "5432"
      DB_USER: "PostgreSQL"
      DB_PASSWORD: "6715320D"
      DB_NAME: "tecno"
      DATABASE_URL: "postgres://PostgreSQL:6715320D@tecnoia_tecnologi:5432/tecno?sslmode=disable"

      # ---- GRATUITOS (solo registro) ----
      # Groq → https://console.groq.com/keys
      GROQ_API_KEY: ""

      # OpenRouter → https://openrouter.ai/keys
      OPENROUTER_API_KEY: ""

      # Cerebras → https://cloud.cerebras.ai
      CEREBRAS_API_KEY: ""

      # Together AI → https://api.together.xyz
      TOGETHER_AI_API_KEY: ""

      # ---- DE PAGO OPCIONALES ----
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      GOOGLE_GENERATIVE_AI_API_KEY: ""
      MISTRAL_API_KEY: ""
      XAI_API_KEY: ""

      # ---- Freemodel (para Web Operator) ----
      FREEMODEL_API_KEY: "fe_oa_db8434da9d092b657e26dba8e2cdbf5cc460848f7e3b490c"
      FREEMODEL_BASE_URL: "https://api.freemodel.dev/v1"
      FREEMODEL_MODEL: "gpt-4o"

      # ---- Puter.js ----
      PUTER_AUTH_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0IjoiZ3VpIiwidiI6IjAuMC4wIiwidSI6ImRDdjMrQURQU1BldFk0Z09JLyt3Umc9PSIsInV1Ijoic0VDNE5SZi9Ra3FBYWlIZ1FsTWNWZz09IiwiaWF0IjoxNzc4ODYyMDk2fQ.OA-DQOWYxuE0tSxhR4Egl2x50KSgYyPeu-HjT-JqSrs"

      # ---- Ollama (local en el mismo servidor) ----
      OLLAMA_HOST: ""
    ports:
      - "3000:3000"

    mounts:
      # Proyectos y workspace
      - type: volume
        name: opencode-workspace
        mountPath: /workspace
      # Base de datos SQLite (sesiones y memoria persistente)
      - type: volume
        name: opencode-data
        mountPath: /root/.local/share/opencode
      # Configuración de OpenCode
      - type: volume
        name: opencode-config
        mountPath: /root/.config/opencode

  # ---- Ollama (opcional, para modelos locales gratuitos) ----
